name: AGENTS.md check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  agents-md:
    name: AGENTS.md exists at root
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Assert AGENTS.md presence
        run: |
          if [ ! -f AGENTS.md ]; then
            echo "::error::AGENTS.md is required at the repo root."
            exit 1
          fi
          # Sanity check — empty AGENTS.md is just as useless as a missing one.
          if [ ! -s AGENTS.md ]; then
            echo "::error::AGENTS.md exists but is empty."
            exit 1
          fi
          echo "AGENTS.md present ($(wc -l < AGENTS.md) lines)."
