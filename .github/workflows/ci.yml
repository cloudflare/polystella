name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm exec tsc --noEmit

  format:
    name: Prettier check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .

  changeset-validate:
    name: Changeset validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate pending changesets
        run: |
          shopt -s extglob
          if compgen -G ".changeset/!(README).md" > /dev/null; then
            pnpm changeset status --since=origin/main
          else
            echo "No pending changesets; skipping validation."
          fi

  build:
    name: Library + CLI build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify dist tree
        # Smoke-check every exports entry resolves to an emitted file.
        run: |
          test -f dist/cli.js
          test -x dist/cli.js
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/runtime/index.js
          test -f dist/runtime/middleware.js
          test -f dist/runtime/locals.d.ts
          test -f dist/content/index.js
          test -f dist/i18n/index.js
          test -f dist/react/index.js
      - name: Smoke-test the CLI bundle under bare Node
        # No tsx, no Vite — exactly the environment a downstream
        # consumer's standalone `polystella <subcommand>` invocation
        # uses. Regression guard for the Node 24
        # `ERR_UNSUPPORTED_NODE_MODULES_TYPESCRIPT` class of bug.
        run: node dist/cli.js --version
